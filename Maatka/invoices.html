<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAATKA | Invoices Management</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --black-primary: #0a0a0a;
            --black-secondary: #0f0f0f;
            --black-card: rgba(18, 18, 18, 0.92);
            --gold-primary: #FFD700;
            --gold-secondary: #F4B400;
            --gold-accent: #FFC107;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #F4B400 100%);
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --success: #00e676;
            --danger: #ff5252;
            --warning: #ffb74d;
            --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black-primary);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Bg Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }

        .gold-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotate(-15deg);
            top: -50%;
            left: -50%;
            opacity: 0.5;
        }

        /* Login Page Styles */
        #loginPage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--black-card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.05);
            text-align: center;
            transition: var(--transition);
        }

        .login-card:hover {
            border-color: rgba(255, 215, 0, 0.4);
            transform: translateY(-5px);
        }

        .login-logo {
            font-family: 'Clash Display', sans-serif;
            font-size: 2.5rem;
            color: var(--gold-primary);
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            opacity: 0.7;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .btn-login {
            width: 100%;
            background: var(--gold-gradient);
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: var(--black-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .login-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        /* Dashboard Styles */
        #dashboardPage {
            display: none;
            flex-direction: row;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--black-card);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 215, 0, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.8rem;
            color: var(--gold-primary);
            font-weight: 700;
            margin-bottom: 50px;
            padding-left: 10px;
        }

        .sidebar-menu {
            list-style: none;
            flex-grow: 1;
        }

        .menu-item {
            margin-bottom: 15px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 12px;
            transition: var(--transition);
            font-weight: 500;
        }

        .menu-link:hover,
        .menu-link.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold-primary);
        }

        .menu-link i {
            font-size: 1.1rem;
            width: 20px;
        }

        .logout-btn {
            margin-top: auto;
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.2);
            background: rgba(255, 82, 82, 0.05);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-left: 280px;
            padding: 40px;
            max-width: calc(100% - 280px);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .greeting-box h2 {
            font-family: 'Clash Display', sans-serif;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .greeting-box p {
            color: var(--text-gray);
        }

        .current-time {
            text-align: right;
            background: rgba(255, 215, 0, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .current-time span {
            display: block;
            color: var(--gold-primary);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* Table Section */
        .table-section {
            background: var(--black-card);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
            padding: 30px;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px 10px 40px;
            border-radius: 10px;
            color: white;
            width: 300px;
            transition: var(--transition);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            opacity: 0.6;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--gold-primary);
            width: 350px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 15px;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(255, 215, 0, 0.02);
        }

        .invoice-id {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--gold-primary);
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-paid {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .status-pending {
            background: rgba(255, 183, 77, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 183, 77, 0.3);
        }

        .btn-action {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .btn-action:hover {
            background: var(--gold-primary);
            color: var(--black-primary);
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.05);
        }

        .filters-left {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.8rem;
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            color-scheme: dark;
        }

        .btn-apply {
            background: var(--gold-primary);
            color: var(--black-primary);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-gray);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-info {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 80px;
                padding: 30px 10px;
            }

            .sidebar-logo {
                display: none;
            }

            .sidebar-menu span,
            .logout-btn span {
                display: none;
            }

            .main-content {
                margin-left: 80px;
                max-width: calc(100% - 80px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="gold-grid"></div>
    </div>



    <!-- Dashboard Content -->
    <div id="dashboardPage">
        <aside class="sidebar">
            <div class="sidebar-logo">MAATKA</div>
            <ul class="sidebar-menu">
                <li class="menu-item">
                    <a href="admin.html" class="menu-link">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="members.html" class="menu-link">
                        <i class="fas fa-users"></i>
                        <span>Members</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="invoices.html" class="menu-link active">
                        <i class="fas fa-file-invoice"></i>
                        <span>Invoices</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="transactions.html" class="menu-link">
                        <i class="fas fa-file-invoice-dollar"></i>
                        <span>Transactions</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="security-logs.html" class="menu-link">
                        <i class="fas fa-shield-halved"></i>
                        <span>Security Logs</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="settings.html" class="menu-link">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>
            <div class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout Session</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="greeting-box">
                    <h2>Invoices</h2>
                    <p>Manage and track all generated invoices.</p>
                </div>
                <div class="current-time">
                    <span id="timeDisplay">10:00:00 AM</span>
                    <p id="dateDisplay">Wednesday, Feb 11, 2026</p>
                </div>
            </header>

            <section class="table-section">
                <div class="table-header">
                    <h3 class="table-title">Invoices Directory</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="invoiceSearch" placeholder="Search invoice ID or member...">
                    </div>
                </div>

                <div class="controls-bar">
                    <div class="filters-left">
                        <div class="filter-group">
                            <label>Date From</label>
                            <input type="date" id="dateFrom" class="filter-control">
                        </div>
                        <div class="filter-group">
                            <label>Date To</label>
                            <input type="date" id="dateTo" class="filter-control">
                        </div>
                        <button onclick="applyFilters()" class="btn-apply">Apply</button>
                        <button onclick="clearFilters()" class="btn-reset">Reset</button>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Invoice ID</th>
                                <th>Member Name</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="invoiceTableBody">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <button id="prevPage" class="page-btn"><i class="fas fa-chevron-left"></i></button>
                    <div id="pageInfo" class="page-info">Page 1 of 1</div>
                    <button id="nextPage" class="page-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Security Gate: Prevent direct access
        if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'admin.html';
        }

        // Dashboard Content is now visible by default since security gate handles access
        document.getElementById('dashboardPage').style.display = 'flex';

        // Mock Invoices
        const mockInvoices = [];

        let currentPage = 1;
        const itemsPerPage = 8;
        let filteredData = [...mockInvoices];

        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function logout() {
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin.html';
        }

        updateTime();
        renderTable();
        setInterval(updateTime, 1000);

        function applyFilters() {
            const term = document.getElementById('invoiceSearch').value.toLowerCase();
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;

            filteredData = mockInvoices.filter(inv => {
                const matchSearch = inv.id.toLowerCase().includes(term) || inv.member.toLowerCase().includes(term);
                const matchDate = (!from || inv.date >= from) && (!to || inv.date <= to);
                return matchSearch && matchDate;
            });
            currentPage = 1;
            renderTable();
        }

        function clearFilters() {
            document.getElementById('invoiceSearch').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            applyFilters();
        }

        function renderTable() {
            const tbody = document.getElementById('invoiceTableBody');
            const total = Math.ceil(filteredData.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageData = filteredData.slice(start, start + itemsPerPage);

            tbody.innerHTML = pageData.map(inv => `
                <tr>
                    <td><span class="invoice-id">${inv.id}</span></td>
                    <td>${inv.member}</td>
                    <td style="color:var(--text-gray)">${inv.date}</td>
                    <td style="font-weight:700;">${inv.amount}</td>
                    <td><span class="status-badge ${inv.status === 'Paid' ? 'status-paid' : 'status-pending'}">${inv.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="downloadInvoice('${inv.id}')">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.max(1, total)}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage >= total;
        }

        document.getElementById('invoiceSearch').addEventListener('input', applyFilters);
        document.getElementById('prevPage').onclick = () => { if (currentPage > 1) { currentPage--; renderTable(); } };
        document.getElementById('nextPage').onclick = () => {
            const total = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage < total) { currentPage++; renderTable(); }
        };

        function downloadInvoice(id) {
            alert(`Downloading Invoice ${id}...`);
            // Implement actual download logic here
        }
    </script>
</body>

</html>
