<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem('maintenanceMode') !== 'enabled') {
            window.location.href = 'index.html';
        }
    </script>
    <title>MAATKA | System Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black-primary: #0a0a0a;
            --black-secondary: #fffaea;
            --black-card: rgba(18, 18, 18, 0.92);
            --gold-primary: #FFD700;
            --gold-secondary: #F4B400;
            --gold-accent: #FFC107;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #F4B400 50%, #FFC107 100%);
            --gold-glass: rgba(255, 215, 0, 0.12);
            --text-light: #FFFFFF;
            --text-gray: #B0B0B0;
            --glass-border: rgba(255, 215, 0, 0.18);
            --shadow-glow: 0 8px 32px rgba(255, 215, 0, 0.15);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black-primary);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }

        /* Bg Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .gold-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 60s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-50px, -50px) rotate(0.5deg);
            }
        }

        .content-card {
            text-align: center;
            padding: 60px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-container i {
            font-size: 3.5rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 2;
        }

        .gear-spin {
            animation: spin 6s linear infinite;
        }

        .gear-spin-reverse {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 2rem !important;
            animation: spin 5s linear infinite reverse;
            opacity: 0.7;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-family: 'Clash Display', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: var(--text-light);
            font-weight: 600;
        }

        p {
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 300;
            line-height: 1.6;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60%;
            background: var(--gold-gradient);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        @keyframes loading {
            0% {
                left: -40%;
            }

            50% {
                left: 20%;
                width: 80%;
            }

            100% {
                left: 100%;
                width: 10%;
            }
        }

        .notify-btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid var(--gold-primary);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.05em;
            background: transparent;
            color: var(--gold-primary);
        }

        .notify-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .contact-info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .contact-info a {
            color: var(--gold-primary);
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="gold-grid"></div>
    </div>

    <div class="content-card">
        <div class="icon-container">
            <i class="fas fa-cog gear-spin"></i>
            <i class="fas fa-cog gear-spin-reverse"></i>
        </div>
        <h2>System Maintenance</h2>
        <p>We are currently upgrading our platform to provide you with a better experience. We will be back online
            shortly.</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <button class="notify-btn">
            <i class="far fa-bell"></i> Notify Me When Up
        </button>

        <div class="contact-info">
            Need urgent help? <a href="mailto:support@maatka.com">Contact Support</a>
        </div>
    </div>
</body>

</html>
