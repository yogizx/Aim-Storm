<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAATKA | Membership Confirmed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black-primary: #0a0a0a;
            --black-secondary: #101010;
            --black-card: rgba(18, 18, 18, 0.92);
            --gold-primary: #FFD700;
            --gold-secondary: #F4B400;
            --gold-accent: #FFC107;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #F4B400 50%, #FFC107 100%);
            --text-light: #FFFFFF;
            --text-gray: #B0B0B0;
            --glass-bg: rgba(20, 20, 20, 0.78);
            --glass-border: rgba(255, 215, 0, 0.18);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-glow: 0 8px 32px rgba(255, 215, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black-primary);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #0a0a0a 100%);
        }

        .gold-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 120s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-50px, -50px) rotate(0.5deg);
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Success Specific Styles */
        .success-hero {
            padding: 100px 0 60px;
            text-align: center;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.05);
            animation: fadeIn 1s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 24px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .success-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 3rem;
            margin-bottom: 16px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .success-message {
            color: var(--text-gray);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
            text-align: left;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 16px;
        }

        .detail-label {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .legacy-id-box {
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.05) 0%, rgba(10, 10, 10, 0.8) 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 215, 0, 0.05);
            transition: var(--transition);
        }

        .legacy-id-box:hover {
            border-color: var(--gold-primary);
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.15), inset 0 0 30px rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
        }

        .legacy-id-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            animation: rotateLight 10s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateLight {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .legacy-id-box h4 {
            color: var(--gold-primary);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 16px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .legacy-id {
            font-family: 'Clash Display', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            text-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
            position: relative;
            z-index: 2;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: var(--gold-primary);
            padding: 12px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
            z-index: 2;
            overflow: hidden;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .copy-btn:hover {
            background: var(--gold-primary);
            color: var(--black-primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 16px 36px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: var(--black-primary);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 48px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        .footer p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .success-card {
                padding: 30px;
            }

            .success-title {
                font-size: 2rem;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="gold-grid"></div>
        <canvas id="hero-canvas"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6;"></canvas>
    </div>

    <section class="success-hero">
        <div class="container">
            <div class="success-card">
                <div class="success-icon">✨</div>
                <h1 class="success-title">Welcome to MAATKA</h1>
                <p class="success-message">
                    Your membership is confirmed. You've taken a meaningful step toward the future. A confirmation email
                    has been sent to you.
                </p>

                <div class="legacy-id-box">
                    <h4>YOUR LEGACY ID</h4>
                    <div class="legacy-id" id="legacyId">...loading...</div>
                    <button class="copy-btn" onclick="copyLegacyId()">
                        <i class="fas fa-copy"></i> Copy ID
                    </button>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-label">Asset Allocation</span>
                        <div class="detail-value" style="color: var(--gold-primary);">100 KRITA</div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Status</span>
                        <div class="detail-value" style="color: #00e676;">Active</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="#" class="btn btn-primary" id="downloadInvoice">
                        <i class="fas fa-download"></i> Download Invoice
                    </a>
                    <a href="../index.html" class="btn btn-secondary">
                        Return Home
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MAATKA. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Use URL Params to populate data if available
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || 'MTK-' + Math.floor(Math.random() * 1000000);
        document.getElementById('legacyId').textContent = id;
        document.getElementById('downloadInvoice').href = `api/invoice-download.php?id=${id}`;

        function copyLegacyId() {
            const text = document.getElementById('legacyId').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy ID';
                }, 2000);
            });
        }

        // Particle Animation
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const properties = {
            particleColor: 'rgba(255, 215, 0, 1)',
            lineColor: 'rgba(255, 215, 0)',
            particleCount: 40,
            connectionDistance: 150,
            mouseDistance: 200,
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < properties.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < properties.connectionDistance) {
                        let op = 1 - (distance / properties.connectionDistance);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 215, 0, ${op * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>

</html>
