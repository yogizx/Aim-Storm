<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAATKA | 404 - Lost in the Digital Frontier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --black-primary: #0a0a0a;
            --black-secondary: #101010;
            --gold-primary: #FFD700;
            --gold-secondary: #F4B400;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #F4B400 50%, #FFC107 100%);
            --text-light: #FFFFFF;
            --text-gray: #B0B0B0;
            --glass-bg: rgba(20, 20, 20, 0.78);
            --glass-border: rgba(255, 215, 0, 0.18);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black-primary);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #0a0a0a 100%);
        }

        .gold-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 120s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-50px, -50px) rotate(0.5deg);
            }
        }

        .error-container {
            text-align: center;
            padding: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.05);
            animation: containerEntry 1s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes containerEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .error-code {
            font-family: 'Clash Display', sans-serif;
            font-size: 10rem;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.3));
            position: relative;
        }

        .error-code::before,
        .error-code::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
            background: var(--black-primary);
        }

        .error-code::before {
            color: #0ff;
            z-index: -1;
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        .error-code::after {
            color: #f0f;
            z-index: -2;
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
                transform: translate(-2px, 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
                transform: translate(2px, 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
                transform: translate(-2px, 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
                transform: translate(2px, 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
                transform: translate(-2px, 0);
            }

            100% {
                clip-path: inset(30% 0 20% 0);
                transform: translate(2px, 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
                transform: translate(2px, 0);
            }

            20% {
                clip-path: inset(30% 0 20% 0);
                transform: translate(-2px, 0);
            }

            40% {
                clip-path: inset(70% 0 10% 0);
                transform: translate(2px, 0);
            }

            60% {
                clip-path: inset(50% 0 30% 0);
                transform: translate(-2px, 0);
            }

            80% {
                clip-path: inset(20% 0 50% 0);
                transform: translate(2px, 0);
            }

            100% {
                clip-path: inset(40% 0 40% 0);
                transform: translate(-2px, 0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .error-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .error-message {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 45px;
            background: var(--gold-gradient);
            color: var(--black-primary);
            text-decoration: none;
            border-radius: 15px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
        }

        .btn-home i {
            font-size: 1.2rem;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .error-code {
                font-size: 7rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-container {
                padding: 40px 20px;
            }

            .btn-home {
                padding: 16px 30px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="gold-grid"></div>
        <canvas id="hero-canvas"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6;"></canvas>
    </div>

    <div class="error-container">
        <div class="error-code" data-text="404">404</div>
        <h1 class="error-title">Dimensional Rift</h1>
        <p class="error-message">
            The path you followed has faded into the digital void. This coordinate no longer exists within the MAATKA
            network.
        </p>
        <a href="../index.html" class="btn-home">
            <i class="fas fa-arrow-left"></i>
            RE-ESTABLISH CONNECTION
        </a>
    </div>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>

    <script>
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const properties = {
            particleColor: 'rgba(255, 215, 0, 1)',
            lineColor: 'rgba(255, 215, 0)',
            particleCount: 50,
            connectionDistance: 150,
            mouseDistance: 200,
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < properties.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < properties.connectionDistance) {
                        let op = 1 - (distance / properties.connectionDistance);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 215, 0, ${op * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>

</html>
