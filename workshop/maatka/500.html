<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - MAATKA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #d4af37;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        
        .error-title {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-home:hover {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.5;
        }
        
        .support-link {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
        
        .support-link a {
            color: #d4af37;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon">⚠️</div>
        <div class="error-code">500</div>
        <h1 class="error-title">Internal Server Error</h1>
        <p class="error-message">
            Something went wrong on our end. We're working to fix it. 
            Please try again in a few moments.
        </p>
        <a href="index.html" class="btn-home">Return to Home</a>
        <div class="support-link">
            Need immediate help? <a href="mailto:support@maatka.com">Contact Support</a>
        </div>
    </div>
</body>
</html>
